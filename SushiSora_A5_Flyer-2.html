<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Sushi Sora – A5 Flyer Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Josefin Sans',sans-serif;background:#1a1a1a;color:#fff;overflow:hidden;}
.app{display:flex;height:100vh;}

/* Sidebar */
.sidebar{width:270px;min-width:270px;background:#111;border-right:1px solid #222;display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:10px 12px 7px;border-bottom:1px solid #222;flex-shrink:0;}
.sb-head h1{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#aaa;}
.sb-head p{font-size:8px;color:#444;margin-top:2px;}
.sb-tabs{display:flex;border-bottom:1px solid #222;flex-shrink:0;}
.sb-tab{flex:1;padding:7px 4px;font-family:'Josefin Sans',sans-serif;font-size:7.5px;letter-spacing:0.1em;text-transform:uppercase;color:#444;background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;}
.sb-tab.active{color:#ddd;border-bottom-color:#ddd;}
.sb-scroll{flex:1;overflow-y:auto;padding:8px 10px 12px;}
.sb-scroll::-webkit-scrollbar{width:3px;}
.sb-scroll::-webkit-scrollbar-thumb{background:#333;}
.sec-block{margin-bottom:10px;}
.sec-lbl{font-size:7.5px;letter-spacing:0.12em;text-transform:uppercase;color:#444;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:#1e1e1e;}
.field{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.field label{font-size:7.5px;color:#555;white-space:nowrap;min-width:44px;}
.field input,.field select{flex:1;background:#161616;border:1px solid #222;color:#ccc;padding:3px 6px;font-family:'Josefin Sans',sans-serif;font-size:9px;outline:none;}
.field input:focus,.field select:focus{border-color:#444;}
.item-row{background:#161616;border:1px solid #1e1e1e;border-radius:2px;margin-bottom:3px;padding:4px 6px;position:relative;}
.item-del{position:absolute;top:3px;right:4px;background:transparent;border:none;color:#333;font-size:11px;cursor:pointer;padding:1px 3px;}
.item-del:hover{color:#c55;}
.item-top{display:grid;grid-template-columns:1fr 40px;gap:4px;margin-bottom:3px;}
.item-top input{background:#1e1e1e;border:1px solid #222;color:#ddd;padding:3px 5px;font-family:'Josefin Sans',sans-serif;font-size:9px;outline:none;}
.item-top input.pr{text-align:right;color:#fff;}
.item-desc-inp{width:100%;background:#1a1a1a;border:1px solid #1e1e1e;color:#666;padding:2px 5px;font-family:'Josefin Sans',sans-serif;font-size:8px;outline:none;margin-bottom:3px;}
.tag-row{display:flex;gap:3px;}
.tag-btn{font-size:7.5px;padding:2px 5px;cursor:pointer;border:1px solid #2a2a2a;color:#444;background:transparent;font-family:'Josefin Sans',sans-serif;}
.tag-btn.on{border-color:#777;color:#ddd;background:#222;}
.btn-add{width:100%;margin-top:3px;background:transparent;border:1px dashed #2a2a2a;color:#444;padding:4px;font-family:'Josefin Sans',sans-serif;font-size:7.5px;cursor:pointer;text-align:center;letter-spacing:0.1em;}
.btn-add:hover{border-color:#555;color:#aaa;}
.toggle-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.toggle-lbl{font-size:8px;color:#666;}
.toggle{width:28px;height:14px;background:#333;border-radius:7px;cursor:pointer;position:relative;flex-shrink:0;transition:background 0.2s;}
.toggle.on{background:#4a8;}
.toggle::after{content:'';position:absolute;width:10px;height:10px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left 0.2s;}
.toggle.on::after{left:16px;}
.sb-foot{padding:8px 10px;border-top:1px solid #222;flex-shrink:0;display:flex;gap:5px;}
.btn-print{flex:1;background:#fff;color:#000;border:none;padding:8px;font-family:'Josefin Sans',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;}
.btn-save{background:#1a2a1a;color:#6a9;border:1px solid #2a4a2a;padding:8px 9px;font-family:'Josefin Sans',sans-serif;font-size:8px;font-weight:700;cursor:pointer;}
.btn-reset{background:#1a1a1a;color:#555;border:1px solid #222;padding:8px;font-family:'Josefin Sans',sans-serif;font-size:7.5px;cursor:pointer;}

/* Preview */
.preview{flex:1;overflow:auto;background:#888;display:flex;flex-direction:column;align-items:center;padding:16px;gap:10px;}
.page-tabs{display:flex;gap:6px;flex-shrink:0;}
.ptab{font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:6px 16px;cursor:pointer;border:1.5px solid #aaa;background:transparent;color:#ddd;}
.ptab.active{background:#fff;color:#000;border-color:#fff;}

/* A4 sheet (A5 x2 나란히) */
.sheet{display:flex;flex-direction:row;box-shadow:0 2px 16px rgba(0,0,0,0.5);}

/* A5 Page */
.page{
  width:148.5mm;height:210mm;
  background:#fff;color:#111;
  padding:7mm 7.5mm 6mm;
  display:flex;flex-direction:column;
  flex-shrink:0;
  font-family:'Josefin Sans',sans-serif;
  overflow:hidden;
  border-right:1px dashed #ccc;
}
.page:last-child{border-right:none;}

.p-hdr{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:0.9pt solid #333;padding-bottom:2mm;margin-bottom:2.5mm;flex-shrink:0;height:14mm;gap:3mm;}
.p-logo img{height:11mm;width:auto;display:block;}
.p-legend{display:flex;gap:1.5mm;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.p-leg{display:flex;align-items:center;gap:1mm;font-size:6pt;color:#444;}
.p-tag{display:inline-block;padding:0.2mm 1mm;border:0.7pt solid #444;border-radius:2pt;font-size:3.8pt;font-weight:600;color:#444;vertical-align:middle;margin-left:1mm;line-height:1.6;}
.p-leg .p-tag{margin-left:0;}
.p-content{display:grid;grid-template-columns:1fr 1fr;gap:0 5.5mm;flex:1;min-height:0;}
.p-col{display:flex;flex-direction:column;gap:4mm;overflow:hidden;}
.p-sec{font-family:'Noto Sans JP',sans-serif;font-size:8pt;font-weight:400;letter-spacing:0.14em;text-transform:uppercase;color:#111;border-bottom:0.8pt solid #333;padding-bottom:1.2mm;margin-bottom:2.5mm;display:flex;align-items:center;gap:2mm;}
.p-sec-sub{font-size:6pt;color:#666;font-style:italic;text-transform:none;letter-spacing:0;font-weight:300;}
.p-sub{display:flex;align-items:center;justify-content:center;gap:2mm;margin:2.5mm 0 1.8mm;}
.p-sub-lbl{font-size:6pt;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#111;}
.p-sub-rule{width:7mm;height:0.6pt;background:#666;}
.p-item{margin-bottom:2mm;}
.p-row{display:grid;grid-template-columns:minmax(0,1fr) 7mm;gap:1mm;align-items:baseline;}
.p-nm{font-size:9pt;font-weight:400;line-height:1.2;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-pr{font-size:6pt;font-weight:400;color:#444;text-align:right;white-space:nowrap;}
.p-dc{font-size:7pt;color:#666;font-style:italic;margin-top:0.3mm;padding-left:1.2mm;line-height:1.25;}
.p-bx{background:#f4f4f4;border:0.5pt solid #bbb;padding:1.5mm 1.8mm;font-size:6.5pt;color:#444;line-height:1.35;margin-bottom:2mm;}
.p-ftr-bar{flex-shrink:0;margin-top:auto;border-top:1pt solid #333;padding-top:3mm;display:flex;align-items:center;justify-content:space-between;gap:4mm;}
.ftr-left{display:flex;flex-direction:column;gap:1.2mm;flex:1;}
.ftr-row{display:flex;flex-direction:column;gap:0.3mm;}
.fi-lbl{font-size:5.5pt;letter-spacing:0.16em;text-transform:uppercase;color:#aaa;}
.fi-val{font-size:8.5pt;color:#222;letter-spacing:0.04em;}
.ftr-qr-block{display:flex;flex-direction:column;align-items:center;gap:1.5mm;flex-shrink:0;}
.ftr-qr-lbl{font-size:6.5pt;letter-spacing:0.12em;text-transform:uppercase;color:#555;font-weight:600;text-align:center;}
.ftr-qr-box{padding:2mm;border:0.6pt solid #bbb;line-height:0;}
.ftr-qr-box img{width:20mm;height:20mm;display:block;}

@media print{
  html,body{background:#fff;overflow:visible;}
  .sidebar,.preview>.page-tabs,.ptab{display:none!important;}
  .preview{background:#fff!important;padding:0!important;display:block!important;overflow:visible!important;}
  .print-sheet{
    width:297mm!important;height:210mm!important;
    display:flex!important;flex-direction:row!important;
    overflow:hidden!important;
    visibility:visible!important;position:relative!important;left:auto!important;
    box-shadow:none!important;
  }
  .front-sheet{page-break-after:always;break-after:page;}
  .page{
    box-shadow:none!important;margin:0!important;
    width:148.5mm!important;height:210mm!important;
    flex-shrink:0!important;display:flex!important;
    border-left:none!important;
  }
  @page{size:A4 landscape;margin:0;}
  -webkit-print-color-adjust:exact;print-color-adjust:exact;
}
</style>
</head>
<body>
<div class="app">

<div class="sidebar">
  <div class="sb-head">
    <h1>✏ A5 플라이어 에디터</h1>
    <p>메뉴 편집 + 푸터 설정 → A4 양면 Print</p>
  </div>
  <div class="sb-tabs">
    <button class="sb-tab active" id="stab-front" onclick="switchTab('front')">앞면 메뉴</button>
    <button class="sb-tab" id="stab-back" onclick="switchTab('back')">뒷면 메뉴</button>
    <button class="sb-tab" id="stab-footer" onclick="switchTab('footer')">푸터 설정</button>
  </div>
  <div class="sb-scroll" id="sb-scroll"></div>
  <div class="sb-foot">
    <button class="btn-reset" onclick="resetAll()">↺ Reset</button>
    <button class="btn-save" onclick="saveData()">💾 Save</button>
    <button class="btn-print" onclick="window.print()">🖨 Print</button>
  </div>
</div>

let S=JSON.parse(JSON.stringify(DEF_S));
let IT=JSON.parse(JSON.stringify(DEF_IT));
let LAYOUT=JSON.parse(JSON.stringify(DEF_LAYOUT));
let FOOTER=JSON.parse(JSON.stringify(DEF_FOOTER));
let currentTab='front';
let currentQRb64=QR_BOOKING_B64;

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function tagHtml(tags){return(tags||[]).map(t=>`<span class="p-tag">${esc(t)}</span>`).join('');}

function renderItem(id){
  const it=IT[id];if(!it)return'';
  return`<div class="p-item">
    <div class="p-row"><div class="p-nm">${esc(it.name)}${tagHtml(it.tags)}</div><div class="p-pr">${esc(it.price)}</div></div>
    ${it.desc?`<div class="p-dc">${esc(it.desc)}</div>`:''}
  </div>`;
}

function renderCol(blocks,elId){
  const el=document.getElementById(elId);
  if(!el)return;
  let h='';
  blocks.forEach(block=>{
    const sec=S[block.sec];
    const subHtml=sec.subtitle?sec.subtitle.replace('__GF__','<span class="p-tag">GF</span>'):'';
    h+=`<div><div class="p-sec">${esc(sec.title)}${subHtml?`<span class="p-sec-sub">${subHtml}</span>`:''
    }</div>`;
    if(sec.boxnote)h+=`<div class="p-bx">${esc(sec.boxnote)}</div>`;
    if(block.items)block.items.forEach(id=>{h+=renderItem(id);});
    if(block.subheads)block.subheads.forEach(sub=>{
      if(sub.key)h+=`<div class="p-sub"><span class="p-sub-rule"></span><span class="p-sub-lbl">${esc(sub.key)}</span><span class="p-sub-rule"></span></div>`;
      else h+=`<div style="margin-top:3mm;"></div>`;
      sub.items.forEach(id=>{h+=renderItem(id);});
    });
    h+='</div>';
  });
  el.innerHTML=h;
}

function renderAllCols(){
  ['','2'].forEach(sfx=>{
    renderCol(LAYOUT.front.left,`front-left${sfx}`);
    renderCol(LAYOUT.front.right,`front-right${sfx}`);
    renderCol(LAYOUT.back.left,`back-left${sfx}`);
    renderCol(LAYOUT.back.right,`back-right${sfx}`);
  });
}

function renderFooters(){
  const f=FOOTER;
  const infoHtml=`
    <div class="ftr-row"><div class="fi-lbl">Find Us</div><div class="fi-val">${esc(f.address)}</div></div>
    <div class="ftr-row" style="margin-top:1.2mm;"><div class="fi-lbl">Phone</div><div class="fi-val">${esc(f.phone)}</div></div>
    ${f.orderOn?`<div class="ftr-row" style="margin-top:1.2mm;"><div class="fi-lbl">${esc(f.orderLbl)}</div><div class="fi-val">${esc(f.orderUrl)}</div></div>`:''}
  `;
  const qrHtml=`<div class="ftr-qr-block">
    <div class="ftr-qr-lbl">${esc(f.qrLabel)}</div>
    <div class="ftr-qr-box"><img src="data:image/png;base64,${currentQRb64}" alt="QR"></div>
  </div>`;
  const content=`<div class="ftr-left">${infoHtml}</div>${qrHtml}`;
  ['ftr-front','ftr-front2','ftr-back','ftr-back2'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.innerHTML=content;
  });
}

function buildSidebarMenu(page){
  let h='';
  ['left','right'].forEach(side=>{
    LAYOUT[page][side].forEach(block=>{
      const sec=S[block.sec];
      const allItems=[];
      if(block.items)allItems.push(...block.items);
      if(block.subheads)block.subheads.forEach(sub=>allItems.push(...sub.items));
      h+=`<div class="sec-block"><div class="sec-lbl">${esc(sec.title)}</div>`;
      allItems.forEach(id=>{
        if(!IT[id])return;
        const it=IT[id];
        const tags=['GF','V','V/GF'].map(t=>{
          const on=(it.tags||[]).includes(t);
          return`<button class="tag-btn${on?' on':''}" onclick="toggleTag('${id}','${t}',this)">${t}</button>`;
        }).join('');
        h+=`<div class="item-row" id="row-${id}">
          <button class="item-del" onclick="delItem('${id}','${block.sec}','${page}','${side}')">✕</button>
          <div class="item-top">
            <input value="${esc(it.name)}" oninput="IT['${id}'].name=this.value;renderAllCols()">
            <input class="pr" value="${esc(it.price)}" oninput="IT['${id}'].price=this.value;renderAllCols()">
          </div>
          <input class="item-desc-inp" value="${esc(it.desc)}" placeholder="설명" oninput="IT['${id}'].desc=this.value;renderAllCols()">
          <div class="tag-row">${tags}</div>
        </div>`;
      });
      h+=`<button class="btn-add" onclick="addItem('${block.sec}','${page}','${side}')">+ 추가</button>`;
      h+='</div>';
    });
  });
  document.getElementById('sb-scroll').innerHTML=h;
}

function buildSidebarFooter(){
  const f=FOOTER;
  document.getElementById('sb-scroll').innerHTML=`
    <div class="sec-block">
      <div class="sec-lbl">가게 정보</div>
      <div class="field"><label>주소</label><input value="${esc(f.address)}" oninput="FOOTER.address=this.value;renderFooters()"></div>
      <div class="field"><label>전화</label><input value="${esc(f.phone)}" oninput="FOOTER.phone=this.value;renderFooters()"></div>
    </div>
    <div class="sec-block">
      <div class="sec-lbl">QR 코드</div>
      <div class="field"><label>종류</label>
        <select onchange="changeQRType(this.value)">
          <option value="booking" ${f.qrType==='booking'?'selected':''}>Booking (ResDiary)</option>
          <option value="order" ${f.qrType==='order'?'selected':''}>Order Online (Square)</option>
        </select>
      </div>
      <div class="field" id="custom-url-row" style="display:${f.qrType==='custom'?'flex':'none'};">
        <label>URL</label><input id="custom-url-inp" value="${esc(f.qrCustomUrl)}" oninput="FOOTER.qrCustomUrl=this.value;">
      </div>
      <div class="field"><label>라벨</label><input value="${esc(f.qrLabel)}" oninput="FOOTER.qrLabel=this.value;renderFooters()"></div>
    </div>
    <div class="sec-block">
      <div class="sec-lbl">온라인 주문</div>
      <div class="toggle-row">
        <div class="toggle${f.orderOn?' on':''}" id="tog-order" onclick="toggleOrder(this)"></div>
        <span class="toggle-lbl" id="tog-lbl">${f.orderOn?'활성':'비활성 (표시 안함)'}</span>
      </div>
      <div id="order-fields" style="display:${f.orderOn?'block':'none'};">
        <div class="field"><label>라벨</label><input value="${esc(f.orderLbl)}" oninput="FOOTER.orderLbl=this.value;renderFooters()"></div>
        <div class="field"><label>URL</label><input value="${esc(f.orderUrl)}" oninput="FOOTER.orderUrl=this.value;renderFooters()"></div>
      </div>
    </div>
  `;
}

function switchTab(tab){
  currentTab=tab;
  ['front','back','footer'].forEach(t=>{
    document.getElementById('stab-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='footer')buildSidebarFooter();
  else buildSidebarMenu(tab);
}

function changeQRType(type){
  FOOTER.qrType=type;

  if(type==='menu')currentQRb64=QR_BOOKING_B64;
  else if(type==='booking')currentQRb64=QR_BOOKING_B64;
  else{
    const url=FOOTER.qrCustomUrl||'https://';
    const tmp=document.createElement('div');
    tmp.style.cssText='position:fixed;left:-9999px;';
    document.body.appendChild(tmp);
    new QRCode(tmp,{text:url,width:200,height:200,colorDark:'#111',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
    setTimeout(()=>{
      const c=tmp.querySelector('canvas');
      if(c)currentQRb64=c.toDataURL('image/png').split(',')[1];
      document.body.removeChild(tmp);
      renderFooters();
    },300);
    return;
  }
  renderFooters();
}

function toggleOrder(el){
  FOOTER.orderOn=!FOOTER.orderOn;
  el.classList.toggle('on',FOOTER.orderOn);
  document.getElementById('tog-lbl').textContent=FOOTER.orderOn?'활성':'비활성 (표시 안함)';
  document.getElementById('order-fields').style.display=FOOTER.orderOn?'block':'none';
  renderFooters();
}

function toggleTag(id,tag,btn){
  const it=IT[id];
  if(tag==='V/GF'){const has=it.tags.includes('V/GF');it.tags=it.tags.filter(t=>t!=='V'&&t!=='GF'&&t!=='V/GF');if(!has)it.tags.push('V/GF');}
  else{if(tag==='V'||tag==='GF')it.tags=it.tags.filter(t=>t!=='V/GF');const i=it.tags.indexOf(tag);if(i>=0)it.tags.splice(i,1);else it.tags.push(tag);}
  btn.closest('.item-row').querySelector('.tag-row').innerHTML=
    ['GF','V','V/GF'].map(t=>{const on=IT[id].tags.includes(t);return`<button class="tag-btn${on?' on':''}" onclick="toggleTag('${id}','${t}',this)">${t}</button>`;
  }).join('');
  renderAllCols();
}

function addItem(secId,page,side){
  const nid='a5_'+Date.now();
  IT[nid]={name:'',price:'',desc:'',tags:[]};
  const block=LAYOUT[page][side].find(b=>b.sec===secId);
  if(block){if(block.items)block.items.push(nid);else if(block.subheads)block.subheads[block.subheads.length-1].items.push(nid);}
  buildSidebarMenu(page);renderAllCols();
  setTimeout(()=>{const r=document.getElementById('row-'+nid);if(r)r.querySelector('input').focus();},50);
}

function delItem(id,secId,page,side){
  const block=LAYOUT[page][side].find(b=>b.sec===secId);
  if(block){if(block.items)block.items=block.items.filter(i=>i!==id);if(block.subheads)block.subheads.forEach(s=>s.items=s.items.filter(i=>i!==id));}
  delete IT[id];buildSidebarMenu(page);renderAllCols();
}

function showSheet(s){
  const sf=document.getElementById('sheet-front');
  const sb=document.getElementById('sheet-back');
  // 화면: 선택된 것만 보이게 (visibility로 — print에는 영향 없음)
  sf.style.visibility=s==='front'?'visible':'hidden';
  sf.style.position=s==='front'?'relative':'absolute';
  sf.style.left=s==='front'?'auto':'-9999px';
  sb.style.visibility=s==='back'?'visible':'hidden';
  sb.style.position=s==='back'?'relative':'absolute';
  sb.style.left=s==='back'?'auto':'-9999px';
  document.getElementById('ptab-front').classList.toggle('active',s==='front');
  document.getElementById('ptab-back').classList.toggle('active',s==='back');
}

function saveData(){
  try{localStorage.setItem('sora_a5v3',JSON.stringify({S,IT,LAYOUT,FOOTER}));
  const el=document.createElement('div');
  el.style.cssText='position:fixed;bottom:60px;left:0;width:270px;background:#1a3a1a;color:#8bc;font-size:9px;padding:6px 12px;text-align:center;z-index:99;';
  el.textContent='💾 저장 완료';document.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
  }catch(e){}
}

function loadData(){
  try{
    const d=JSON.parse(localStorage.getItem('sora_a5v3'));
    if(!d)return false;
    S=d.S;IT=d.IT;LAYOUT=d.LAYOUT;FOOTER=d.FOOTER;
    if(FOOTER.qrType==='booking')currentQRb64=QR_BOOKING_B64;
    else if(FOOTER.qrType==='order')currentQRb64=QR_ORDER_B64;
    return true;
  }catch(e){return false;}
}

function resetAll(){
  if(!confirm('초기화하시겠습니까?'))return;
  localStorage.removeItem('sora_a5v3');
  S=JSON.parse(JSON.stringify(DEF_S));
  IT=JSON.parse(JSON.stringify(DEF_IT));
  LAYOUT=JSON.parse(JSON.stringify(DEF_LAYOUT));
  FOOTER=JSON.parse(JSON.stringify(DEF_FOOTER));
  currentQRb64=QR_BOOKING_B64;
  switchTab('front');renderAllCols();renderFooters();
}

// Init
if(!loadData()){
  S=JSON.parse(JSON.stringify(DEF_S));
  IT=JSON.parse(JSON.stringify(DEF_IT));
  LAYOUT=JSON.parse(JSON.stringify(DEF_LAYOUT));
  FOOTER=JSON.parse(JSON.stringify(DEF_FOOTER));
}
switchTab('front');
renderAllCols();
renderFooters();
showSheet('front');
</script>
